server {
    listen 80 default_server;
    listen [::]:80 default_server;

    server_name _;

    root /srv/tgs/instances/Vibelin/webroot_assets;

    location / {
        # tgui windows load these assets from a local BYOND webview origin
        # (http://127.0.0.1:<random port>), so CORS headers are mandatory
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range, Origin, Accept, Content-Type" always;
        add_header Access-Control-Expose-Headers "Content-Length, Content-Range" always;
        add_header Cache-Control "public, max-age=604800, immutable" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
        gzip_static on;
    }

    access_log /var/log/nginx/vibelin-assets.access.log;
    error_log /var/log/nginx/vibelin-assets.error.log;
}
